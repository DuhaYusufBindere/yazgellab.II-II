# YAZLAB 2 Projesi Merkezi Konfigürasyon Dosyası

data:
  skab_path: "data/SKAB"
  batadal_path: "data/BATADAL/BATADAL_dataset04.csv"
  train_split: 0.6
  val_split: 0.2
  test_split: 0.2

deep_learning:
  max_epochs: 50
  batch_size: 32
  early_stopping_patience: 5
  learning_rate: 0.001
  lstm_hidden_size: 64
  cnn_filters: 64

automata:
  # Deneylerde grid-search için kullanılacak varyasyonlar
  window_sizes: [3, 4, 5, 6]
  alphabet_sizes: [3, 4, 5, 6]
  
  # Sabit karşılaştırma senaryosu için default değerler (PDF'te belirtilen)
  default_window_size: 4
  default_alphabet_size: 3

experiment:
  seeds: [42, 123, 2026, 7, 999]
  noise_mean: 0.0
  noise_std: 0.1
